<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calc-X</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-700">
    <div class="sm:w-4/12 w-11/12 h-64  mx-auto mt-10 border-none shadow-2xl">
        <section class="bg-blue-950 h-1/3 rounded-t-2xl w-12/12 flex flex-col gap-4 items-end justify-end mx-auto px-4">
            <p id="num-el" class="font-bold text-white text-2xl text-right"></p>
            <p id="result-el" class="font-bold text-white text-2xl text-right"></p>
        </section>
        <section class="bg-white mb-4 rounded-b-xl">
            <div class="grid grid-cols-4 gap-4 mx-4 py-2 w-10/12 mx-auto">
                <button class="bg-red-500 hover:bg-red-700 p-4 rounded-lg active:scale-90 col-span-2 font-bold" onclick="clean()">C</button>
                <button class="bg-gray-200 hover:bg-gray-300 p-4 rounded-lg active:scale-90 font-bold" onclick="backSpace()">⃪</button>
                <button class="bg-amber-400 hover:bg-amber-600 p-4 rounded-lg active:scale-90 text-white font-bold text-3xl" onclick="operation('/')">÷</button>
                <button class="bg-gray-200 hover:bg-gray-300 p-4 rounded-lg active:scale-90 font-bold" value="7" onclick="addNumber(7)">7</button>
                <button class="bg-gray-200 hover:bg-gray-300 p-4 rounded-lg active:scale-90 font-bold" onclick="addNumber(8)">8</button>
                <button class="bg-gray-200 hover:bg-gray-300 p-4 rounded-lg active:scale-90 font-bold" onclick="addNumber(9)">9</button>
                <button class="bg-amber-400 hover:bg-amber-600 p-4 rounded-lg active:scale-90 text-white font-bold text-3xl" onclick="operation('*')">x</button>
                <button class="bg-gray-200 hover:bg-gray-300 p-4 rounded-lg active:scale-90 font-bold" onclick="addNumber(4)">4</button>
                <button class="bg-gray-200 hover:bg-gray-300 p-4 rounded-lg active:scale-90 font-bold" onclick="addNumber(5)">5</button>
                <button class="bg-gray-200 hover:bg-gray-300 p-4 rounded-lg active:scale-90 font-bold" onclick="addNumber(6)">6</button>
                <button class="bg-amber-400 hover:bg-amber-600 p-4 rounded-lg active:scale-90 text-white font-bold text-3xl" onclick="operation('-')">-</button>
                <button class="bg-gray-200 hover:bg-gray-300 p-4 rounded-lg active:scale-90 font-bold" onclick="addNumber(1)">1</button>
                <button class="bg-gray-200 hover:bg-gray-300 p-4 rounded-lg active:scale-90 font-bold" onclick="addNumber(2)">2</button>
                <button class="bg-gray-200 hover:bg-gray-300 p-4 rounded-lg active:scale-90 font-bold" onclick="addNumber(3)">3</button>
                <button class="bg-amber-400 hover:bg-amber-600 p-4 rounded-lg active:scale-90 text-white font-bold text-3xl" onclick="operation('+')">+</button>
                <button class="bg-gray-200 hover:bg-gray-300 p-4 rounded-lg active:scale-90 col-span-2 font-bold" onclick="addNumber(0)">0</button>
                <button class="bg-gray-200 hover:bg-gray-300 p-4 rounded-lg active:scale-90 font-bold" onclick="addNumber('.')">.</button>
                <button class="bg-amber-400 hover:bg-amber-600 p-4 rounded-lg active:scale-90 text-white font-bold text-3xl" onclick="calculate()">=</button>
            </div> 
        </section>
    </div>
    <script src="new.js"></script>
</body>
</html>
